<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="760" height="760" fill="#f0f2f5"/>

  <!-- ── Header ── -->
  <text x="20" y="38" font-size="14" fill="#6c63ff" font-weight="600">← Back</text>
  <text x="90" y="35" font-size="26" fill="#1a1a2e" font-weight="700">Sarah's Birthday 🎂</text>
  <text x="90" y="56" font-size="14" fill="#666">📅 Friday, April 18, 2026</text>

  <!-- ── Event ID Box ── -->
  <rect x="20" y="72" width="720" height="42" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="32" y="97" font-size="13" fill="#555">Event ID:</text>
  <text x="102" y="97" font-size="12" fill="#333" font-family="monospace">a3f9d2c1-7b4e-4f8a-9c2d-1e5f6a7b8c9d</text>
  <rect x="638" y="82" width="92" height="24" rx="6" fill="white" stroke="#ddd" stroke-width="1.5"/>
  <text x="684" y="98" font-size="12" fill="#555" text-anchor="middle">Copy</text>

  <!-- ── Gifts Section (compact) ── -->
  <rect x="20" y="128" width="720" height="108" rx="12" fill="white" stroke="#e8e8f0" stroke-width="1"/>
  <text x="32" y="156" font-size="17" fill="#1a1a2e" font-weight="600">Gifts</text>
  <rect x="610" y="138" width="118" height="32" rx="8" fill="#6c63ff"/>
  <text x="669" y="158" font-size="14" fill="white" text-anchor="middle" font-weight="600">+ Add Gift</text>
  <rect x="32" y="175" width="696" height="48" rx="8" fill="white" stroke="#e8e8f0" stroke-width="1.5"/>
  <text x="44" y="196" font-size="14" fill="#1a1a2e" font-weight="600">Wireless headphones</text>
  <text x="44" y="213" font-size="12" fill="#6c63ff" font-weight="600">€89.99</text>
  <rect x="520" y="183" width="130" height="26" rx="6" fill="white" stroke="#ddd" stroke-width="1.5"/>
  <text x="585" y="200" font-size="12" fill="#555" text-anchor="middle">Mark purchased</text>

  <!-- ── Contributions Section with form open ── -->
  <rect x="20" y="252" width="720" height="468" rx="12" fill="white" stroke="#e8e8f0" stroke-width="1"/>

  <!-- Contributions header -->
  <text x="32" y="280" font-size="17" fill="#1a1a2e" font-weight="600">Contributions</text>
  <text x="32" y="299" font-size="13" fill="#555">Total: <tspan fill="#38a169" font-weight="700">€50.00</tspan></text>
  <!-- Cancel button (secondary) -->
  <rect x="622" y="260" width="106" height="32" rx="8" fill="white" stroke="#ddd" stroke-width="1.5"/>
  <text x="675" y="280" font-size="14" fill="#666" text-anchor="middle">Cancel</text>

  <!-- ── Contribute Form ── -->
  <rect x="32" y="318" width="696" height="148" rx="10" fill="#f9f9fc" stroke="#e8e8f0" stroke-width="1.5"/>

  <!-- Amount label -->
  <text x="44" y="344" font-size="13" fill="#444" font-weight="500">Amount (€)</text>

  <!-- Amount input (focused, primary border) -->
  <rect x="44" y="356" width="672" height="40" rx="8" fill="white" stroke="#6c63ff" stroke-width="2"/>
  <text x="56" y="381" font-size="15" fill="#1a1a2e">30</text>
  <!-- cursor blink -->
  <rect x="76" y="365" width="1.5" height="22" fill="#6c63ff"/>

  <!-- Submit button -->
  <rect x="44" y="412" width="672" height="40" rx="8" fill="#6c63ff"/>
  <text x="380" y="436" font-size="14" fill="white" text-anchor="middle" font-weight="600">Confirm contribution</text>

  <!-- ── Existing Contributions ── -->
  <rect x="32" y="484" width="696" height="42" rx="8" fill="white" stroke="#e8e8f0" stroke-width="1.5"/>
  <text x="44" y="510" font-size="14" fill="#38a169" font-weight="600">€50.00</text>
  <text x="718" y="510" font-size="12" fill="#777" text-anchor="end">Mar 10, 2026</text>

  <rect x="32" y="536" width="696" height="42" rx="8" fill="white" stroke="#e8e8f0" stroke-width="1.5"/>
  <text x="44" y="562" font-size="14" fill="#38a169" font-weight="600">€15.00</text>
  <text x="718" y="562" font-size="12" fill="#777" text-anchor="end">Mar 15, 2026</text>

  <rect x="32" y="588" width="696" height="42" rx="8" fill="white" stroke="#e8e8f0" stroke-width="1.5"/>
  <text x="44" y="614" font-size="14" fill="#38a169" font-weight="600">€12.50</text>
  <text x="718" y="614" font-size="12" fill="#777" text-anchor="end">Mar 18, 2026</text>
</svg>
