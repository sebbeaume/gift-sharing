  <text x="669" y="158" font-size="14" fill="white" text-anchor="middle" font-weight="600">+ Add Gift</text>

  <!-- Gift 1 -->
  <rect x="32" y="175" width="696" height="48" rx="8" fill="white" stroke="#e8e8f0" stroke-width="1.5"/>
  <text x="44" y="196" font-size="14" fill="#1a1a2e" font-weight="600">Wireless headphones</text>
  <text x="44" y="213" font-size="12" fill="#6c63ff" font-weight="600">€89.99</text>
  <rect x="520" y="183" width="130" height="26" rx="6" fill="white" stroke="#ddd" stroke-width="1.5"/>
  <text x="585" y="200" font-size="12" fill="#555" text-anchor="middle">Mark purchased</text>
  <text x="670" y="200" font-size="16" fill="#ccc">✕</text>

  <!-- Gift 2 (purchased, dimmed) -->
  <rect x="32" y="234" width="696" height="48" rx="8" fill="white" stroke="#e8e8f0" stroke-width="1.5" opacity="0.55"/>
  <text x="44" y="255" font-size="14" fill="#1a1a2e" font-weight="600" opacity="0.55">Book: Atomic Habits</text>
  <text x="44" y="272" font-size="12" fill="#6c63ff" font-weight="600" opacity="0.55">€15.00</text>
  <rect x="520" y="242" width="130" height="26" rx="6" fill="white" stroke="#38a169" stroke-width="1.5" opacity="0.55"/>
  <text x="585" y="259" font-size="12" fill="#38a169" text-anchor="middle" opacity="0.55">✓ Purchased</text>

  <!-- ── Contributions Section ── -->
  <rect x="20" y="330" width="720" height="270" rx="12" fill="white" stroke="#e8e8f0" stroke-width="1"/>

  <!-- Contributions header -->
  <text x="32" y="358" font-size="17" fill="#1a1a2e" font-weight="600">Contributions</text>
  <text x="32" y="377" font-size="13" fill="#555">Total: <tspan fill="#38a169" font-weight="700">€100.00</tspan></text>
  <rect x="598" y="338" width="130" height="32" rx="8" fill="#6c63ff"/>
  <text x="663" y="358" font-size="14" fill="white" text-anchor="middle" font-weight="600">+ Contribute</text>

  <!-- Contribution 1 -->
  <rect x="32" y="396" width="696" height="42" rx="8" fill="white" stroke="#e8e8f0" stroke-width="1.5"/>
  <text x="44" y="422" font-size="14" fill="#38a169" font-weight="600">€50.00</text>
  <text x="678" y="422" font-size="12" fill="#777" text-anchor="end">Mar 10, 2026</text>

  <!-- Contribution 2 -->
  <rect x="32" y="448" width="696" height="42" rx="8" fill="white" stroke="#e8e8f0" stroke-width="1.5"/>
  <text x="44" y="474" font-size="14" fill="#38a169" font-weight="600">€25.00</text>
  <text x="678" y="474" font-size="12" fill="#777" text-anchor="end">Mar 15, 2026</text>

  <!-- Contribution 3 -->
  <rect x="32" y="500" width="696" height="42" rx="8" fill="white" stroke="#e8e8f0" stroke-width="1.5"/>
  <text x="44" y="526" font-size="14" fill="#38a169" font-weight="600">€10.00</text>
  <text x="678" y="526" font-size="12" fill="#777" text-anchor="end">Mar 18, 2026</text>

  <!-- Contribution 4 -->
  <rect x="32" y="552" width="696" height="42" rx="8" fill="white" stroke="#e8e8f0" stroke-width="1.5"/>
  <text x="44" y="578" font-size="14" fill="#38a169" font-weight="600">€15.00</text>
  <text x="678" y="578" font-size="12" fill="#777" text-anchor="end">Mar 18, 2026</text>
