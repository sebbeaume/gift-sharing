<svg xmlns="http://www.w3.org/2000/svg" width="760" height="820" viewBox="0 0 760 820" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="760" height="820" fill="#f0f2f5"/>

  <!-- ── Header ── -->
  <text x="20" y="38" font-size="14" fill="#6c63ff" font-weight="600">← Back</text>
  <text x="90" y="35" font-size="26" fill="#1a1a2e" font-weight="700">Sarah's Birthday 🎂</text>
  <text x="90" y="56" font-size="14" fill="#666">📅 Friday, April 18, 2026</text>

  <!-- ── Event ID Box ── -->
  <rect x="20" y="72" width="720" height="42" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="32" y="97" font-size="13" fill="#555">Event ID:</text>
  <text x="102" y="97" font-size="12" fill="#333" font-family="monospace">a3f9d2c1-7b4e-4f8a-9c2d-1e5f6a7b8c9d</text>
  <rect x="638" y="82" width="92" height="24" rx="6" fill="white" stroke="#ddd" stroke-width="1.5"/>
  <text x="684" y="98" font-size="12" fill="#555" text-anchor="middle">Copy</text>

  <!-- ── Gifts Section ── -->
  <rect x="20" y="128" width="720" height="185" rx="12" fill="white" stroke="#e8e8f0" stroke-width="1"/>

